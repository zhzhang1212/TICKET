<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - 智约校园</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; background: #fafafa; padding: 20px; margin: 0; }
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: #2e7d32; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .back-link:focus { outline: 2px solid #2e7d32; outline-offset: 2px; border-radius: 2px; }
        h1 { color: #2c3e50; margin-top: 0; }
        .card { padding: 24px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); border-left: 5px solid #7b1fa2; }
        .info-row { margin-bottom: 14px; display: flex; align-items: flex-start; flex-wrap: wrap; gap: 6px; }
        .info-label { color: #555; min-width: 110px; font-weight: bold; font-size: 0.92em; flex-shrink: 0; }
        .info-value { font-weight: bold; color: #333; word-break: break-all; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 0.9em; font-weight: bold; }
        button {
            padding: 11px 22px; border: none; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 0.95em;
        }
        button:hover { opacity: 0.85; }
        button:focus { outline: 3px solid #1a237e; outline-offset: 2px; }
        button:disabled { background: #9e9e9e !important; color: #fff; cursor: not-allowed; }
        #pay-countdown-zone p { color: #c62828; font-weight: bold; margin-top: 0; }
        #system-msg { margin-top: 14px; color: #555; min-height: 1.4em; }
        @media (max-width: 500px) {
            .info-row { flex-direction: column; }
            button { width: 100%; margin: 4px 0 !important; }
            h1 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link" aria-label="返回首页">← 返回首页</a>
    <main>
        <h1>订单 / 凭证详情</h1>

        <div class="card" role="region" aria-label="订单信息">
            <div id="loading-msg" role="status" aria-live="polite">正在加载订单信息...</div>

            <div id="ticket-info" style="display:none;">
                <dl>
                    <div class="info-row">
                        <dt class="info-label">活动名称</dt>
                        <dd class="info-value" id="t-event-name">--</dd>
                    </div>
                    <div class="info-row">
                        <dt class="info-label">抢票人</dt>
                        <dd class="info-value" id="t-username">--</dd>
                    </div>
                    <div class="info-row">
                        <dt class="info-label">创单时间</dt>
                        <dd class="info-value" id="t-timestamp" style="font-family:monospace; color:#555;">--</dd>
                    </div>
                    <div class="info-row">
                        <dt class="info-label">订单流水号</dt>
                        <dd class="info-value" id="t-order-id" style="font-family:monospace;">--</dd>
                    </div>
                    <div class="info-row" id="t-voucher-row" style="display:none;">
                        <dt class="info-label">入场凭证</dt>
                        <dd class="info-value" id="t-voucher" style="color:#2e7d32; font-family:monospace; font-size:1.2em;">--</dd>
                    </div>
                    <div class="info-row">
                        <dt class="info-label">当前状态</dt>
                        <dd><span id="t-status" class="status-badge" style="background:#9e9e9e;">--</span></dd>
                    </div>
                </dl>

                <div id="action-zone" style="margin-top:24px; padding-top:18px; border-top:1px dashed #e0e0e0;">
                    <div id="pay-countdown-zone" style="display:none; margin-bottom:14px;">
                        <p aria-live="polite">⏳ 剩余支付时间：<span id="pay-countdown">05:00</span></p>
                    </div>
                    <button id="btn-pay" style="background:#2e7d32; color:white; margin-right:10px; display:none;"
                            aria-label="立即模拟支付">立即模拟支付</button>
                    <button id="btn-cancel" style="background:#c62828; color:white; display:none;"
                            aria-label="取消此订单">取消订单</button>
                </div>

                <div id="system-msg" aria-live="assertive" role="alert"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import("/static/event/js/ticket_detail.js?t=" + new Date().getTime());
    </script>
</body>
</html>
