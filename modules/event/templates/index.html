<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>活动秒杀服务</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px;}
        .controls { margin-bottom: 20px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        button { padding: 12px 20px; border:none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover { opacity: 0.8;}
        button:disabled { background: #ccc !important; cursor: not-allowed;}
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: #4caf50; text-decoration: none;}
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .event-card { padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eee; border-top-width: 5px; display:flex; flex-direction:column; justify-content:space-between; }
        .event-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="app">
        <a href="/" class="back-link">← 返回首页</a>
        <h1 style="color: #2c3e50;">活动秒杀服务体验大厅</h1>
        
        <div id="activity-list">
            <h3 style="margin-top:0">📢 当前火爆活动列表</h3>
            <div id="dynamic-events-container" class="grid-container">
                <span style="color:#aaa;">正在加载活动...</span>
            </div>
        </div>

        <div id="activity-detail" class="controls" style="display:none; border-left: 5px solid #4caf50;">
            <!-- details moved to detail.html -->
        </div>
    </div>

    <!-- 模块化引入 ES6 脚本 (使用动态 import 防止缓存旧版本) -->
    <script type="module">
        import("/static/event/js/booking.js?t=" + new Date().getTime());
    </script>
</body>
</html>
