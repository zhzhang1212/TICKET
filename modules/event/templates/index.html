<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>活动秒杀服务</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px;}
        .controls { margin-bottom: 20px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        button { padding: 12px 20px; border:none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover { opacity: 0.8;}
        button:disabled { background: #ccc !important; cursor: not-allowed;}
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: #4caf50; text-decoration: none;}
    </style>
</head>
<body>
    <div id="app">
        <a href="/" class="back-link">← 返回首页</a>
        <h1 style="color: #2c3e50;">活动秒杀服务体验大厅</h1>
        
        <div id="activity-list" class="controls">
            <h3 style="margin-top:0">📢 当前火爆活动列表</h3>
            <div style="display: flex; gap: 15px;">
                <button class="activity-btn" data-id="concert_2026" data-name="某明星演唱会 (2026巡演)" style="background:#e91e63; color:white;">🎤 某明星演唱会</button>
                <button class="activity-btn" data-id="singing_contest" data-name="年度十佳歌手总决赛" style="background:#9c27b0; color:white;">🎶 十佳歌手决赛</button>
            </div>
        </div>

        <div id="activity-detail" class="controls" style="display:none; border-left: 5px solid #4caf50;">
            <h3 style="margin-top:0" id="detail-title">活动详情</h3>
            <p style="color: #555;">正在查看该特定活动的抢票通道。</p>
            
            <div style="margin-top: 15px;">
                <strong>🎭 管理员操作：</strong>
                <button id="btn-init" style="background:#ffc107; color:#333; margin-left:10px;">发布此活动 (释出2张票)</button>
            </div>
            
            <div style="margin-top: 15px;">
                <strong>🧑‍🎓 学生抢夺：</strong>
                <button id="btn-book" style="background:#4caf50; color:white; margin-left:10px;">⚡ 立即抢占该活动！</button>
            </div>
            <div id="status-msg" style="margin-top:20px; font-size:1.2em; color:#666;"></div>
        </div>
    </div>

    <!-- 模块化引入 ES6 脚本 (使用动态 import 防止缓存旧版本) -->
    <script type="module">
        import("/static/event/js/booking.js?t=" + new Date().getTime());
    </script>
</body>
</html>
