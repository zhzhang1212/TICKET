<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 智约校园</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; background: #fafafa; padding: 20px; margin: 0; }
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: #2e7d32; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .back-link:focus { outline: 2px solid #2e7d32; outline-offset: 2px; border-radius: 2px; }
        h1 { color: #2c3e50; margin-top: 0; }
        .card { margin-bottom: 20px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); border-left: 5px solid #2e7d32; }
        .stat-row { margin-bottom: 8px; }
        #event-desc { color: #555; margin: 0 0 12px; }
        button {
            padding: 12px 24px; border: none; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 1em;
        }
        button:hover { opacity: 0.85; }
        button:focus { outline: 3px solid #1b5e20; outline-offset: 2px; }
        button:disabled { background: #9e9e9e !important; color: #fff; cursor: not-allowed; }
        #timing-info { color: #555; font-weight: bold; display: block; margin-bottom: 4px; }
        #penalty-info { color: #c62828; font-weight: bold; display: block; margin-bottom: 12px; min-height: 1.2em; }
        #status-msg { margin-top: 20px; font-size: 1.1em; color: #555; min-height: 1.5em; }
        @media (max-width: 500px) {
            button { width: 100%; }
            h1 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <a href="/event" class="back-link" aria-label="返回活动大厅">← 返回大厅</a>
    <main>
        <h1 id="detail-title">活动详情</h1>

        <div class="card" role="region" aria-labelledby="detail-title">
            <div id="event-stats" style="margin-bottom:15px; padding:12px; background:#f5f5f5; border-radius:6px;">
                <p id="event-desc"></p>
                <div class="stat-row">🎟️ <strong>有效票数：</strong><span id="event-total">--</span></div>
                <div class="stat-row">🎫 <strong>剩余票数：</strong><span id="event-stock">--</span></div>
            </div>

            <div style="margin-top:15px;">
                <span id="timing-info" aria-live="polite"></span>
                <span id="penalty-info" aria-live="assertive" role="alert"></span>
                <button id="btn-book" disabled aria-label="点击报名或抢票">点击报名 / 抢票</button>
            </div>

            <div id="status-msg" aria-live="polite" role="status"></div>
        </div>
    </main>

    <script type="module">
        import("/static/event/js/detail.js?t=" + new Date().getTime());
    </script>
</body>
</html>
