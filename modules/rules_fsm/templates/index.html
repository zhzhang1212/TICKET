<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>底层规则与风控中心</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px;}
        .card { padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; cursor: pointer; transition: 0.2s;}
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15);}
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: #4caf50; text-decoration: none;}
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        #detail-panel { display: none; margin-top: 20px; padding: 20px; background: #fff; border-radius: 8px; border-left: 5px solid #2196f3;}
        .record-list { list-style: none; padding: 0; }
        .record-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .record-item:last-child { border-bottom: none; }
        .timestamp { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <div id="app">
        <a href="/" class="back-link">← 返回首页</a>
        <h1 style="color: #2c3e50;">底层规则 FSM 与 管理大盘</h1>
        
        <div class="grid-container" id="main-dashboard">
            <div class="card" onclick="alert('房间管理模块尚未接入此大盘面板。')">
                <h3>🚪 房间管理</h3>
                <p style="color:#888;">学术空间、研讨室的管理控制台与预约审核。</p>
            </div>
            
            <div class="card" onclick="alert('场地管理模块尚未接入此大盘面板。')">
                <h3>🏟️ 场地管理</h3>
                <p style="color:#888;">体育场馆、公共场地的排期及风控管理。</p>
            </div>
            
            <div class="card" id="btn-ticket-mgr">
                <h3>🎫 票务管理</h3>
                <p style="color:#888;">高并发热门活动的抢票成功明细与统计，查看用户抢占时间轴，发布及管理活动。</p>
            </div>
        </div>

        <div id="ticket-management-section" style="display:none; margin-top:30px; border-top:2px solid #eee; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="margin:0; color:#2196f3;">票务管理台</h2>
                <button id="btn-show-publish" style="padding:10px 20px; font-size:1em; background:#4caf50; color:white; border:none; border-radius:5px; cursor:pointer;">发布新活动</button>
            </div>
            
            <div class="grid-container" id="event-list-container">
                <!-- 活动将通过JS在此处渲染卡片 -->
            </div>

            <!-- 发布新活/编辑活动的统一详情面板 -->
            <div id="detail-panel" style="display:none;">
            <h3 id="panel-title" style="margin-top:0;">发布/编辑</h3>
            
            <div id="admin-editor" style="margin-bottom: 20px; padding: 15px; border: 1px dashed #2196f3; background: #fafafa; border-radius: 8px;">
                <h4 style="margin-top:0; color: #2196f3;">⚙️ 发行与管理编辑</h4>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <input type="hidden" id="edit-event-id">
                    <label>活动 ID: <input type="text" id="edit-event-slot-id" style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" placeholder="如 slot_202610_01"></label>
                    <label>活动名称: <input type="text" id="edit-event-name" style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"></label>
                    <label>活动描述: <textarea id="edit-event-desc" style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" rows="3"></textarea></label>
                    <label id="label-for-capacity">有效票数/票数增减: <input type="number" id="edit-event-capacity" style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" value="0"></label>
                    <small id="capacity-hint" style="color:gray;">新建时填入总量。编辑时填入要增加或减少的值，如+10或-5。</small>
                    <button id="btn-publish-event" style="padding: 8px 15px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight:bold; margin-top:5px;">🚀 确认发布 / 更新活动</button>
                    <button id="btn-close-panel" style="padding: 8px 15px; background: #ccc; color: black; border: none; border-radius: 4px; cursor: pointer; font-weight:bold; margin-top:5px;">❌ 关闭并取消</button>
                </div>
            </div>

            <div id="event-stats" style="margin-bottom: 15px; padding: 10px; background: #eef2f5; border-radius: 4px; display: none;">
                <div><strong>活动概况：</strong> <span id="event-desc">--</span></div>
                <div style="margin-top: 5px;">🔥 <span id="event-stock-info"></span></div>
            </div>

            <div id="records-view" style="display:none;">
                <h4>📝 用户检测与票务明细 (成功购票清单)</h4>
                <button id="btn-refresh" style="padding: 5px 15px; margin-bottom: 10px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 4px;">刷新明细</button>
                <ul id="records-container" class="record-list">
                    <li class="record-item" style="color: #999;">暂无数据</li>
                </ul>
            </div>
        </div>
        </div>
    </div>
    
    <!-- 引入专用的大盘管理脚本 -->
    <script type="module">
        import("/static/rules_fsm/js/fsm.js?t=" + new Date().getTime());
    </script>
</body>
</html>
