<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智约校园</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px;}
        h1 { color: #2c3e50; text-align: center; }
        .card-container { display: flex; gap: 20px; justify-content: center; margin-top: 40px; flex-wrap: wrap;}
        .card { flex: 1; min-width: 280px; max-width: 350px; background: #fff; padding: 30px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none; color: inherit;}
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15);}
        .card h2 { margin-top: 0; color: #4caf50; }
        .card p { color: #555; line-height: 1.5; }
        .card.event h2 { color: #e91e63; }
        .card.space h2 { color: #2196f3; }
        .card.fsm h2 { color: #ff9800; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>智约校园 - 模块入口</h1>
            <div id="user-profile" style="background:#e8f5e9; padding: 10px 15px; border-radius: 20px; font-size:0.9em; font-weight:bold; color:#4caf50; display:none;">
                <span id="curr-username"></span> (信誉分: <span id="curr-reputation"></span>) 
                <a href="#" id="logout-btn" style="margin-left:10px; color:red; text-decoration:none;">[退出]</a>
            </div>
        </div>
        
        <div class="card-container">
            <a href="/space" class="card space">
                <h2>🏫 空间预订</h2>
                <p>探索学术、体育等常规开放空间，体验平稳时段和防冲突管理及 5 分钟缓冲释放机制。</p>
            </a>

            <a href="/event" class="card event">
                <h2>⚡ 活动秒杀</h2>
                <p>处理火爆讲座、限时放票等高并发场景，体验 Redis 队列削峰、 Celery 异步落库防御架构。</p>
            </a>

            <a href="/rules_fsm" class="card fsm">
                <h2>⚙️ 规则与风控中心</h2>
                <p>核心防御流转系统。动态计分、防重规则和状态机机制观测（不对外开放服务）。</p>
            </a>
        </div>

        <!-- 👇 新增：个人档案数据展示面板 -->
        <div id="my-bookings" style="margin-top: 40px; display: none;">
            <h2 style="color: #2c3e50;">📝 我的档案与预定记录</h2>
            <div id="records-container" style="background:#fff; padding:30px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1); display:flex; gap: 20px; text-align: left;">
                
                <div style="flex:1;">
                    <h3 style="color:#e91e63;">🎟️ 抢票活动凭证 (Event)</h3>
                    <div id="records-tickets" style="color:#666; font-size:0.95em;">加载中...</div>
                </div>

                <div style="flex:1;">
                    <h3 style="color:#2196f3;">🏫 预约空间房间 (Room)</h3>
                    <div id="records-rooms" style="color:#666; font-size:0.95em;">加载中...</div>
                </div>

                <div style="flex:1;">
                    <h3 style="color:#4caf50;">🏸 预约体育设施 (Venue)</h3>
                    <div id="records-venues" style="color:#666; font-size:0.95em;">加载中...</div>
                </div>

            </div>
        </div>

    </div>
    <script>
        async function fetchProfile(userId) {
            try {
                const res = await fetch(`/api/v1/auth/profile/${userId}`);
                const data = await res.json();
                
                // 处理并倒序排序 Tickets（按时间戳从新到旧）
                const sortedTickets = data.tickets.sort((a, b) => {
                    const timeA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                    const timeB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                    return timeB - timeA;
                });
                
                let ticketHtml = sortedTickets.length === 0 ? "暂无历史记录<br><br>" : "";
                sortedTickets.forEach(t => {
                    const passColor = t.status.includes('成功') ? 'green' : (t.status.includes('失败') ? 'red' : 'darkorange');
                    ticketHtml += `
                        <div style="border-left: 4px solid ${passColor}; padding-left: 10px; margin-bottom: 12px; background: #fdfdfd; padding: 10px; cursor: pointer;" onclick="window.location.href='/event/ticket?order_id=${t.order_id}'" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='#fdfdfd'">
                            <strong>${t.event_name}</strong> [${t.slot_id}]<br>
                            👉 状态: <span style="color:${passColor}; font-weight:bold;">${t.status}</span><br>
                            👉 凭证: <span style="font-family:monospace;">${t.voucher || '--'}</span><br>
                            ${t.timestamp ? `👉 时间: <span style="font-family:monospace; color:#888;">${t.timestamp}</span>` : ''}
                        </div>
                    `;
                });
                document.getElementById("records-tickets").innerHTML = ticketHtml;

                // 学术空间
                document.getElementById("records-rooms").innerHTML = data.rooms.length === 0
                    ? "暂无空间排期"
                    : data.rooms.map(r => {
                        const info = typeof r === "string" ? JSON.parse(r) : r;
                        const s = info.actual_start ? new Date(info.actual_start).toLocaleString("zh",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
                        const e = info.actual_end   ? new Date(info.actual_end).toLocaleTimeString("zh",{hour:"2-digit",minute:"2-digit"}) : "";
                        return `<p style="margin:4px 0;"><strong>${info.space_name||info.space_id}</strong><br><span style="font-size:0.85em;color:#888;">${s}–${e}</span></p>`;
                    }).join("");
                // 体育设施
                document.getElementById("records-venues").innerHTML = data.venues.length === 0
                    ? "暂无场馆排期"
                    : data.venues.map(v => {
                        const info = typeof v === "string" ? JSON.parse(v) : v;
                        return `<p style="margin:4px 0;"><strong>${info.space_id}</strong><br><span style="font-size:0.85em;color:#888;">${info.slot_date} ${info.slot_hour}:00</span></p>`;
                    }).join("");
                
                document.getElementById("my-bookings").style.display = "block";
            } catch (e) {
                console.error(e);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("campus_user");
            if (!userStr) {
                // 如果未登录，直接拦截踢回登录页
                window.location.href = "/login";
            } else {
                try {
                    const user = JSON.parse(userStr);
                    document.getElementById('curr-username').innerText = user.username;
                    document.getElementById('curr-reputation').innerText = user.reputation;
                    document.getElementById('user-profile').style.display = 'block';
                    fetchProfile(user.userId);
                } catch(e) {
                    window.location.href = "/login";
                }
            }

            document.getElementById('logout-btn').addEventListener("click", () => {
                localStorage.removeItem("campus_user");
                window.location.href = "/login";
            });
        });
    </script>
</body>
</html>
